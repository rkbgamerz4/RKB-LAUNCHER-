name: Build RKB Launcher APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug
      - name: Copy APK
        run: |
          mkdir -p apk_output
          find . -name "*.apk" -exec cp {} apk_output/ \;
          ls apk_output/
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RKB-Launcher-APK
          path: apk_output/
